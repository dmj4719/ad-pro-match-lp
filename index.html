<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ad Pro Match｜大手広告代理店向け 広告のプロ人材活用</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;}
iframe{border:none;width:100%;height:100%;}
</style>
</head>
<body>
<iframe id="pc" src="pc.html"></iframe>
<iframe id="sp" src="sp.html"></iframe>
<script>
function toggle(){
  var pc=document.getElementById('pc'),sp=document.getElementById('sp');
  if(window.innerWidth>768){pc.style.display='block';sp.style.display='none';}
  else{pc.style.display='none';sp.style.display='block';}
}
toggle();
window.addEventListener('resize',toggle);
</script>
</body>
</html>
